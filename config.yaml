audio:
  sample_rate: 22050  # Informational only; actual value is loaded from the dataset
  normalize: peak

features:
  n_fft: 2048
  n_filters: 20
  fmax: 4000
  overlap: 0.5
  frame_size_ms: 30
  hop_size_ms: 10
  edge_trim_frames: 3

data:
  # Dataset name used to build paths inside CORPORA_ROOT
  # (shared corpus directory located outside this repository)
  corpus_name: myUSP

class_merging:
  # In the original paper, Reinke's edema and vocal nodules
  # were merged into a single 'physio' class
  groups_to_merge: ['edema', 'nodulo']
  merged_label: physio

results:
  figures_dir: results/figures
  metrics_dir: results/metrics