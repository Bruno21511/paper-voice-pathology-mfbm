audio:
  sample_rate: 22050  # Informational only; actual value is loaded from the dataset

features:
  n_fft: 2048
  n_filters: 20
  fmax: 4000
  overlap: 0.5
  frame_size_ms: 30
  hop_size_ms: 10

data:
  # Dataset name used to build paths inside CORPORA_ROOT
  # (shared corpus directory located outside this repository)
  corpus_name: myUSP

class_merging:
  # In the original paper, Reinke's edema and vocal nodules
  # were merged into a single 'physio' class
  groups_to_merge: ['edema', 'nodulo']
  merged_label: physio

discriminative_bands:
  # Zero-based indexing.
  #
  # Note regarding Control vs Neuro:
  # The original paper reported band 8 as the most discriminative
  # mean-MFBM feature. The current implementation identifies band 3.
  #
  # Since both bands produce very similar discriminability scores,
  # band 8 is retained here to preserve comparability with the
  # published study.
  control_vs_physio:
    mean_band: 7
    std_band: 2

  control_vs_neuro:
    mean_band: 7
    std_band: 2

  physio_vs_neuro:
    mean_band: 2
    std_band: 2

results:
  figures_dir: results/figures
  metrics_dir: results/metrics